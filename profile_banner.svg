<svg width="1000" height="200" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="trace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="200" fill="url(#bg)"/>

  <!-- circuit traces -->
  <g stroke="#334155" stroke-width="2" fill="none" opacity="0.7">
    <path d="M0,40 H120 L140,60 H300 L320,40 H500"/>
    <path d="M0,160 H100 L120,140 H260 L280,160 H480"/>
    <path d="M1000,50 H820 L800,70 H700"/>
    <path d="M1000,150 H860 L840,130 H720"/>
    <path d="M60,40 V0"/>
    <path d="M60,160 V200"/>
    <path d="M940,50 V0"/>
    <path d="M940,150 V200"/>
  </g>
  <g fill="#38bdf8" opacity="0.9">
    <circle cx="120" cy="40" r="3"/>
    <circle cx="300" cy="60" r="3"/>
    <circle cx="100" cy="160" r="3"/>
    <circle cx="260" cy="140" r="3"/>
    <circle cx="820" cy="50" r="3"/>
    <circle cx="700" cy="70" r="3"/>
    <circle cx="860" cy="150" r="3"/>
    <circle cx="720" cy="130" r="3"/>
  </g>

  <!-- chip in center -->
  <rect x="430" y="70" width="140" height="60" rx="6" fill="#1e293b" stroke="url(#trace)" stroke-width="2"/>
  <text x="500" y="106" font-family="Courier New, monospace" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">RTL</text>
  <g stroke="#38bdf8" stroke-width="2">
    <path d="M430,85 H410 M430,100 H410 M430,115 H410"/>
    <path d="M570,85 H590 M570,100 H590 M570,115 H590"/>
  </g>

  <!-- title text -->
  <text x="500" y="45" font-family="Segoe UI, sans-serif" font-size="26" fill="#f1f5f9" text-anchor="middle" font-weight="600">Umama Hanif</text>
  <text x="500" y="185" font-family="Segoe UI, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Digital Design &amp; Chip Architecture</text>
</svg>
